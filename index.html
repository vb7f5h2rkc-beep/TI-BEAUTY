<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoramento TI - Grafana + GLPI</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: #000;
            color: white;
            font-family: Arial, sans-serif;
        }
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
    </style>
</head>
<body>

<div class="loading" id="loading">Carregando...</div>

<script>
    // URLs - mude se precisar de URL mais específica do dashboard
    const urls = [
        "https://grafana.byseven.com.br/",           // Grafana
        "https://helpdesk.beautycolor.com.br/"       // GLPI
    ];

    let index = 0;
    const intervaloSegundos = 30;   // 30 segundos para teste

    function alternar() {
        index = (index + 1) % urls.length;
        window.location.href = urls[index];
    }

    // Troca automática
    setInterval(alternar, intervaloSegundos * 1000);

    // Carrega a primeira página
    window.onload = function() {
        document.getElementById('loading').style.display = 'none';
        window.location.href = urls[0];
    };
</script>

</body>
</html>
