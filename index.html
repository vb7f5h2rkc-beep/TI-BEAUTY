<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoramento TI - Grafana + GLPI</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: #000;
            color: white;
            font-family: Arial, sans-serif;
        }
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            font-size: 24px;
        }
    </style>
</head>
<body>

<div class="loading" id="loading">Carregando Monitoramento...</div>

<script>
    // URLs exatas
    const urls = [
        "https://grafana.byseven.com.br/d/DWSW-KSJD/alertas-de-monitoramento-zabbix?orgId=78&from=now-6h&to=now&timezone=browser&var-maintenance=$__all&var-Atuacao=$__all",
        "https://helpdesk.beautycolor.com.br/"
    ];

    const intervaloSegundos = 30;   // 30 segundos para teste

    function iniciarRotacao() {
        // Troca a cada 30 segundos
        setInterval(() => {
            const currentUrl = window.location.href;
            const nextIndex = urls.findIndex(url => url === currentUrl) + 1;
            const nextUrl = urls[nextIndex % urls.length];
            window.location.href = nextUrl;
        }, intervaloSegundos * 1000);
    }

    // Carrega a primeira página e inicia a rotação
    window.onload = function() {
        document.getElementById('loading').style.display = 'none';
        
        // Se a URL atual não for nenhuma das nossas, força a primeira
        if (!urls.some(url => window.location.href.includes(url.split('?')[0]))) {
            window.location.href = urls[0];
            return;
        }

        iniciarRotacao();
    };
</script>

</body>
</html>
