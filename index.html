<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoramento TI - Grafana + GLPI</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: none;
        }
        .active {
            display: block;
        }
    </style>
</head>
<body>

<iframe id="page1" class="page active" src="https://grafana.byseven.com.br/"></iframe>
<iframe id="page2" class="page" src="https://helpdesk.beautycolor.com.br/"></iframe>

<script>
    const intervaloSegundos = 30;   // ← Troca a cada 30 segundos (para teste)
    let current = 1;

    function alternarPaginas() {
        const page1 = document.getElementById('page1');
        const page2 = document.getElementById('page2');

        if (current === 1) {
            page1.classList.remove('active');
            page2.classList.add('active');
            current = 2;
        } else {
            page2.classList.remove('active');
            page1.classList.add('active');
            current = 1;
        }
    }

    // Troca automática a cada 30 segundos
    setInterval(alternarPaginas, intervaloSegundos * 1000);

    // Garante que a primeira página apareça
    window.onload = function() {
        document.getElementById('page1').classList.add('active');
    };
</script>

</body>
</html>
