<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoramento TI - Grafana + GLPI</title>
    
    <!-- Meta refresh para troca automática (principal método) -->
    <meta http-equiv="refresh" content="30; url=https://helpdesk.beautycolor.com.br/">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: #000;
            color: white;
            font-family: Arial, sans-serif;
        }
        .info {
            position: absolute;
            bottom: 10px;
            left: 10px;
            font-size: 14px;
            opacity: 0.6;
        }
    </style>
</head>
<body>

<div class="info">Grafana ? GLPI (troca a cada 30s) • Teste rápido</div>

<script>
    // Backup com JavaScript caso o meta refresh não funcione
    const intervaloSegundos = 30;

    setTimeout(() => {
        window.location.href = "https://helpdesk.beautycolor.com.br/";
    }, intervaloSegundos * 1000);
</script>

</body>
</html>
