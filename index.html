<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoramento TI - Grafana + GLPI</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: #000;
            color: white;
            font-family: Arial, sans-serif;
        }
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            font-size: 24px;
        }
    </style>
</head>
<body>

<div class="loading" id="loading">Carregando Monitoramento...</div>

<script>
    // === URLs EXATAS ===
    const urls = [
        "https://grafana.byseven.com.br/d/DWSW-KSJD/alertas-de-monitoramento-zabbix?orgId=78&from=now-6h&to=now&timezone=browser&var-maintenance=$__all&var-Atuacao=$__all",
        "https://helpdesk.beautycolor.com.br/"          // GLPI
    ];

    let index = 0;
    const intervaloSegundos = 30;   // 30 segundos para teste rápido

    function alternarPagina() {
        index = (index + 1) % urls.length;
        window.location.href = urls[index];
    }

    // Troca automática a cada 30 segundos
    setInterval(alternarPagina, intervaloSegundos * 1000);

    // Carrega a primeira página (Grafana)
    window.onload = function() {
        document.getElementById('loading').style.display = 'none';
        window.location.href = urls[0];
    };
</script>

</body>
</html>
