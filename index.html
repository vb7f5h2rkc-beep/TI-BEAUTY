<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoramento TI - Grafana + GLPI</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: #000;
            color: white;
            font-family: Arial, sans-serif;
        }
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            font-size: 28px;
        }
    </style>
</head>
<body>

<div class="loading" id="loading">Carregando Monitoramento...</div>

<script>
    // === SUAS URLs EXATAS ===
    const urls = [
        "https://grafana.byseven.com.br/d/DWSW-KSJD/alertas-de-monitoramento-zabbix?orgId=78&from=now-6h&to=now&timezone=browser&var-maintenance=$__all&var-Atuacao=$__all",
        "https://helpdesk.beautycolor.com.br/"
    ];

    const intervaloSegundos = 30;   // ? 30 segundos para teste

    // Função que decide qual página carregar
    function carregarPagina() {
        const urlAtual = window.location.href.split('?')[0]; // ignora parâmetros

        // Se estamos no Grafana, vai pro GLPI
        if (urlAtual.includes("grafana.byseven.com.br")) {
            window.location.href = urls[1];
        } 
        // Se estamos no GLPI, volta pro Grafana
        else {
            window.location.href = urls[0];
        }
    }

    // Inicia tudo
    window.onload = function() {
        document.getElementById('loading').style.display = 'none';

        // Se não estiver em nenhuma das URLs, força o Grafana
        if (!window.location.href.includes("grafana.byseven.com.br") && 
            !window.location.href.includes("helpdesk.beautycolor.com.br")) {
            window.location.href = urls[0];
            return;
        }

        // Inicia a troca automática
        setInterval(carregarPagina, intervaloSegundos * 1000);
    };
</script>

</body>
</html>
